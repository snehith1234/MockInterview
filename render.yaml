services:
  # Backend API
  - type: web
    name: mock-interview-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    rootDir: backend
    envVars:
      - key: OPENAI_API_KEY
        value: ""
      - key: LLM_MODEL
        value: gpt-4.1-mini

  # Frontend Static Site
  - type: web
    name: mock-interview-ui
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
